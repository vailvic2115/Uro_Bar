<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Win a Free Drink!</title>
<style>
<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(180deg,#7bb3d9,#4e6ea8);
    color:#fffae5;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#4e6ea8;
    padding:28px;
    border-radius:20px;
    max-width:420px;
    width:90%;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    color:#ffeda4;
    margin-top:0;
    font-size:2rem;
}

p{
    line-height:1.5;
}

.question{
    font-size:1.4rem;
    font-weight:bold;
    margin:24px 0;
    color:#ffffff;
}

button{
    display:block;
    width:100%;
    margin:12px 0;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#7bb3d9;
    color:#1d3557;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#ffeda4;
    transform:scale(1.02);
}

.timer{
    font-size:56px;
    color:#ffeda4;
    font-weight:bold;
    margin:20px 0;
}

.correct{
    color:#ffeda4;
    font-size:2rem;
    font-weight:bold;
}

.wrong{
    color:#fffae5;
    font-size:1.8rem;
    font-weight:bold;
}

small{
    color:#fffae5;
    opacity:.8;
}
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const questions=[
{question:"In which place did Amelia work the longest?",answers:["x","y","z"],correct:0},
{question:"What is the name of Amelia's university studies?",answers:["abc","efg","hij"],correct:1},
{question:"How many tattoos does Amelia have?",answers:["6","7","67"],correct:2},
{question:"What color were Wiktoria's hair?",answers:["red","pink","black"],correct:0},
{question:"What color are Wiktoria's eyes?",answers:["blue","brown","green"],correct:0},
{question:"What color are Wiktoria's nails?",answers:["pink","yellow","blue"],correct:2},
{question:"How many tattoos does Wiktoria have?",answers:["9","16","13"],correct:1},
{question:"How many animals live in this apartment?",answers:["1","2","3"],correct:1},
{question:"What's Wiktoria's dog name?",answers:["Baylo","Bing","Bailey"],correct:2},
{question:"What's Wiktoria's favourite movie?",answers:["Zaplątani","Auta","Toy Story"],correct:0},
{question:"How many people are on this party?",answers:["40","60","90"],correct:1},
{question:"How many people live in this apartment?",answers:["2","5","3"],correct:2},
{question:"On which floor is the birthday party?",answers:["4","5","6"],correct:0},
{question:"What's Amelia's cat name?",answers:["Bing","Bebe","Bubu"],correct:1},
{question:"What is Amelia's newest tattoo?",answers:["Bebe's face","flower","strawberry"],correct:2},
{question:"Where Amelia didn't work?",answers:["farmacy","club","vegetable stand"],correct:2},
{question:"Where did Amelia stayed after her last breakup?",answers:["at Nina's","in hotel","at her parents house"],correct:0},
{question:"What is Amelia's nickname on instagram?",answers:["conflargo","conflagro","coflangro"],correct:1},
{question:"How old is Bebe?",answers:["4","2","6"],correct:0},
{question:"In how many lesbian relationships Amelia was?",answers:["2","1","4"],correct:1},
{question:"What type of gummies are Amelia's favourites?",answers:["gummy bears","zozole strips","Aldi vegan fruits"],correct:2},
{question:"Which sport Amelia haven't tried yet?",answers:["pole dance","surfing","skateboarding"],correct:1},
{question:"What is Bailey's favourite TV show?",answers:["Dr. House","Friends","Sex in the City"],correct:0},
{question:"What was Wiktoria's dream job as a kid?",answers:["dancer","influencer","singer"],correct:2},
];
const q=questions[Math.floor(Math.random()*questions.length)];
const app=document.getElementById("app");

function renderQuestion(){
 app.innerHTML="<h1>🍸 Win a Free Drink!</h1><p>Answer one random question correctly to receive your free drink.</p><div class='question'>"+q.question+"</div>";
 q.answers.forEach((a,i)=>{
   const b=document.createElement("button");
   b.textContent=String.fromCharCode(65+i)+". "+a;
   b.onclick=()=>check(i);
   app.appendChild(b);
 });
}
function check(i){
 if(i===q.correct){
   let s=60;
   app.innerHTML="<div class='correct'>🎉 Correct!</div><p>Show this screen to the bartender.</p><div id='t' class='timer'>60</div><p>Reward expires in 60 seconds.</p>";
   const t=document.getElementById("t");
   const iv=setInterval(()=>{
      s--;
      t.textContent=s;
      if(s<=0){
        clearInterval(iv);
        app.innerHTML="<h1>⏰ Time expired</h1><p>Please scan the QR code again.</p>";
      }
   },1000);
 }else{
   app.innerHTML="<div class='wrong'>❌ Wrong answer</div><p>Better luck next time!</p>";
 }
}
renderQuestion();
</script>
</body>
</html>
